<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ======================
         App Identity
    ======================= -->
    <title>Shiko Lingo – Learn English with AI</title>

    <!-- ======================
         SEO & Social
    ======================= -->
    <meta
      name="description"
      content="Shiko Lingo is an AI-powered English learning app with listening, speaking, reading, writing, and smart AI tutor feedback."
    />
    <meta
      name="keywords"
      content="Shiko Lingo, Learn English, AI English, English with AI, Language Learning App"
    />
    <meta name="author" content="Shiko Lingo" />

    <!-- ======================
         Mobile & PWA
    ======================= -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6C4EFF" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ======================
         Pi Network SDK
         (Must be loaded BEFORE React)
    ======================= -->
    <script
      src="https://sdk.minepi.com/pi-sdk.js"
      crossorigin="anonymous"
    ></script>

    <!-- ======================
         Pi SDK Init (LIVE MODE)
         ✔ Live domain
         ✔ Prevent double init
         ✔ Checklist-safe
    ======================= -->
    <script>
      (function () {
        if (!window.Pi) {
          console.error("❌ Pi SDK not loaded");
          return;
        }

        if (window.__PI_SDK_INITIALIZED__) {
          console.warn("⚠️ Pi SDK already initialized");
          return;
        }

        // 🔐 LIVE MODE (required for real domain)
        window.Pi.init({
          version: "2.0",
          sandbox: false,
        });

        window.__PI_SDK_INITIALIZED__ = true;
        console.log("✅ Pi SDK initialized (LIVE mode)");
      })();
    </script>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run Shiko Lingo.
    </noscript>

    <!-- React mounts هنا -->
    <div id="root"></div>

    <!--
      ✔ Static footer removed
      ✔ Legal pages handled inside React Router
    -->
  </body>
</html>
