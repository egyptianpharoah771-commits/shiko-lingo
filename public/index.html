<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>Shiko Lingo – Learn English with AI</title>

    <meta
      name="description"
      content="Shiko Lingo is an AI-powered English learning app with listening, speaking, reading, writing, and smart AI tutor feedback."
    />
    <meta
      name="keywords"
      content="Shiko Lingo, Learn English, AI English, Language Learning App"
    />
    <meta name="author" content="Shiko Lingo" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6C4EFF" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!--
      Pi Network SDK: load and Pi.init() ONLY in Pi Browser on a deployed host.
      Loading this in Chrome/Safari causes postMessage timeouts and breaks the web app.
      Pi apps are intended to run inside Pi Browser; this matches Pi’s integration model.
    -->
    <script>
      (function () {
        var isLocal =
          window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1";
        var ua =
          (typeof navigator !== "undefined" && navigator.userAgent) || "";
        var isPiBrowser = /PiBrowser/i.test(ua);

        if (!isLocal && isPiBrowser) {
          var script = document.createElement("script");
          script.src = "https://sdk.minepi.com/pi-sdk.js";
          script.async = true;
          script.onload = function () {
            try {
              if (window.Pi) {
                window.Pi.init({
                  version: "2.0",
                  sandbox: false,
                });
              }
            } catch (e) {
              console.warn("Pi.init error:", e);
            }
          };
          script.onerror = function () {
            console.warn("Failed to load Pi SDK script");
          };
          document.head.appendChild(script);
        }
      })();
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run Shiko Lingo.</noscript>
    <div id="root">
      <p
        style="
          margin: 0;
          padding: 24px 16px;
          font-family: system-ui, sans-serif;
          color: #212529;
          background: #f8f9fb;
          min-height: 100vh;
          box-sizing: border-box;
        "
      >
        Loading Shiko Lingo…
      </p>
    </div>
  </body>
</html>
